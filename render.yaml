services:
  - type: web
    name: movie-review-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        sync: false  # Render 대시보드에서 Supabase PostgreSQL URL 입력
      - key: HF_API_TOKEN
        sync: false  # HuggingFace API 토큰 입력

  - type: web
    name: movie-review-frontend
    runtime: python
    rootDir: frontend
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: API_BASE_URL
        sync: false  # Render 대시보드에서 백엔드 URL 직접 입력
